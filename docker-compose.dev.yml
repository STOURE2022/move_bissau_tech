# MoveBissau — Environnement de développement complet
# Usage : docker compose -f docker-compose.dev.yml up -d
# Logs  : docker compose -f docker-compose.dev.yml logs -f api
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: movebissau
      POSTGRES_USER: movebissau
      POSTGRES_PASSWORD: movebissau
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movebissau"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend Django (API REST + hot-reload)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - SECRET_KEY=dev-secret-key-movebissau-local
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=movebissau
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENCRYPTION_KEY=dev-encryption-key-32characters!
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8080

  # Django Channels (WebSocket)
  ws:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - SECRET_KEY=dev-secret-key-movebissau-local
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=movebissau
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ENCRYPTION_KEY=dev-encryption-key-32characters!
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - SECRET_KEY=dev-secret-key-movebissau-local
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=movebissau
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENCRYPTION_KEY=dev-encryption-key-32characters!
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker -l info --concurrency=1

  # Celery Beat (tâches planifiées)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - SECRET_KEY=dev-secret-key-movebissau-local
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=movebissau
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ENCRYPTION_KEY=dev-encryption-key-32characters!
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  pgdata_dev:
