# MoveBissau — Docker Compose pour production
# Usage : docker compose -f docker-compose.yml up -d

services:
  # === Base de données PostgreSQL + PostGIS ===
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: movebissau
      POSTGRES_USER: movebissau
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changez-moi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movebissau"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (cache, WebSocket, Celery) ===
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MinIO (stockage S3-compatible) ===
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  # === Backend Django (API REST) ===
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=${DB_PASSWORD:-changez-moi}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-api.movebissau.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://admin.movebissau.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120

  # === Django Channels (WebSocket) ===
  ws:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=${DB_PASSWORD:-changez-moi}
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application

  # === Celery Worker (tâches asynchrones) ===
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=${DB_PASSWORD:-changez-moi}
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker -l info --concurrency=2

  # === Celery Beat (tâches planifiées) ===
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_NAME=movebissau
      - DB_USER=movebissau
      - DB_PASSWORD=${DB_PASSWORD:-changez-moi}
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # === Nginx (reverse proxy + SSL) ===
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/frontend:/usr/share/nginx/html/frontend:ro
      - ./nginx/admin:/usr/share/nginx/html/admin:ro
      - media_data:/usr/share/nginx/media:ro
    depends_on:
      - api
      - ws

volumes:
  pgdata:
  redisdata:
  miniodata:
  media_data:
