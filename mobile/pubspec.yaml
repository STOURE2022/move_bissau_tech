name: movebissau
description: "MoveBissau — Transport avec négociation de prix à Bissau"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # HTTP & WebSocket
  dio: ^5.4.3
  web_socket_channel: ^3.0.0

  # Cartographie (Mapbox + OSM)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Géolocalisation
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Stockage local (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  intl_phone_field: ^3.2.0

  # Internationalisation
  intl: ^0.19.0

  # Sécurité
  flutter_secure_storage: ^9.2.2

  # Notifications push — nécessite google-services.json (voir flutterfire configure)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4

  # Utilitaires
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/i18n/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
