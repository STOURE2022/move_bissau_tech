[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate --noinput 2>&1; echo '=== Migrations done ==='; echo 'PORT='$PORT; daphne -b 0.0.0.0 -p ${PORT:-8000} --verbosity 2 config.asgi:application 2>&1"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
