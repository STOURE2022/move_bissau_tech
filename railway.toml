[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
healthcheckPath = "/api/config/country"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
